<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f8f8f8;
      color: #333;
    }

    header {
      background-color: #b22222;
      color: white;
      text-align: center;
      padding: 1rem;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    nav {
      background: #333;
      padding: 0.5rem;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      color: #ffcc00;
    }

    .menu-section {
      max-width: 900px;
      margin: 2rem auto;
      padding: 1rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .menu-section h2 {
      border-bottom: 2px solid #b22222;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
      color: #b22222;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      margin: 0.5rem 0;
      padding: 0.5rem 0;
      border-bottom: 1px solid #eee;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .item-name {
      font-weight: bold;
    }

    .item-price {
      color: #b22222;
      font-weight: bold;
    }

    footer {
      text-align: center;
      background: #333;
      color: white;
      padding: 1rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Delicious Bites</h1>
    <p>Welcome to our restaurant!</p>
  </header>

  <nav>
    <a href="#starters">Starters</a>
    <a href="#main-course">Main Course</a>
    <a href="#desserts">Desserts</a>
    <a href="#drinks">Drinks</a>
  </nav>

  <section id="starters" class="menu-section">
    <h2>Starters</h2>
    <div class="menu-item">
      <span class="item-name">Garlic Bread</span>
      <span class="item-price">$5</span><img src=https://img.sndimg.com/food/image/upload/q_92,fl_progressive/img/upload/editorial/how-to-garlic-bread/garlic-bread-beauty-1.jpg width="50"></img>

    </div>
    <div class="menu-item">
      <span class="item-name">Caesar Salad</span>
      <span class="item-price">$7</span><img src =https://bakerbynature.com/wp-content/uploads/2025/01/Caesar-Salad-9.jpg width="50"> </img> 
    </div>
  </section>

  <section id="main-course" class="menu-section">
    <h2>Main Course</h2>
    <div class="menu-item">
      <span class="item-name">Grilled Chicken</span>
      <span class="item-price">$12</span> <img src =https://easyhealthyrecipes.com/wp-content/uploads/2022/06/grilled-chicken-rice-16.jpg width="50"></img>
    </div>
    <div class="menu-item">
      <span class="item-name">Veggie Pasta</span>
      <span class="item-price">$10</span> <img src =https://www.kitchensanctuary.com/wp-content/uploads/2020/04/Vegetable-Pasta-Bake-Square-FS-19.jpg width="50"></img>
    </div>
  </section>

  <section id="desserts" class="menu-section">
    <h2>Desserts</h2>
    <div class="menu-item">
      <span class="item-name">Chocolate Cake</span>
      <span class="item-price">$6</span> <img src =https://tatyanaseverydayfood.com/wp-content/uploads/2022/03/The-Best-Dark-Chocolate-Cake-Recipe-3.jpg width="50"></img>
    </div>
    <div class="menu-item">
      <span class="item-name">Ice Cream </span>
      <span class="item-price">$5</span> <img src =https://funcakes.com/content/uploads/2023/06/Ice-cream-recipe-960x960-c-default.jpg width="50"></img>
    </div>
  </section>

  <section id="drinks" class="menu-section">
    <h2>Drinks</h2>
    <div class="menu-item">
      <span class="item-name">Fresh Lemonade</span>
      <span class="item-price">$4</span><img src =https://myincrediblerecipes.com/wp-content/uploads/2023/02/set-2-Lemonade-15-scaled.jpg width="50"></img>
    </div>
    <div class="menu-item">
      <span class="item-name"> </div> </html>
