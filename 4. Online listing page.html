<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fresh Grocery Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        header {
            background-color: #28a745;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .item {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.3s ease;
        }

        .item:hover {
            transform: scale(1.05);
        }

        .item img {
            width: 150px;
            height: 150px;
            object-fit: cover;
        }

        .price {
            color: #28a745;
            font-weight: bold;
        }

        footer {
            background-color: #28a745;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>Fresh Grocery Store</h1>
    <p>Home - Fresh Daily Essentials</p>
</header>

<div class="container">

    <div class="item">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg" alt="Apple">
        <h3>Apple</h3>
        <p class="price">₹120 / kg</p>
    </div>

    <div class="item">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg" alt="Banana">
        <h3>Banana</h3>
        <p class="price">₹60 / dozen</p>
    </div>

    <div class="item">
        <img src="https://5.imimg.com/data5/SELLER/Default/2023/2/AA/HB/ZU/68707536/product-jpeg-1000x1000-500x500.webp">
        <h3>Milk</h3>
        <p class="price">₹55 / litre</p>
    </div>

    <div class="item">
        <img src="https://www.bbassets.com/media/uploads/p/l/40092241_8-britannia-brown-bread-with-goodness-of-wheat-enriched-with-vitamins.jpg">
        <h3>Bread</h3>
        <p class="price">₹40 / pack</p>
    </div>

    <div class="item">
        <img src="https://cdn.britannica.com/94/151894-050-F72A5317/Brown-eggs.jpg">
        <h3>Eggs</h3>
        <p class="price">₹70 / dozen</p>
    </div>

    <div class="item">
        <img src="https://www.jiomart.com/images/product/original/rvbzowg7fl/ahaar-2kg-basmati-rice-1kg-x-2-pack-product-images-orvbzowg7fl-p596097266-1-202308042139.jpg?im=Resize=(420,420)">
        <h3>Rice</h3>
        <p class="price">₹50 / kg</p>
    </div>

    <div class="item">
        <img src="https://5.imimg.com/data5/SELLER/Default/2023/9/344454432/WH/ZE/OZ/50862900/aashirvaad-wheat-flour.jpg">
        <h3>Flour</h3>
        <p class="price">₹60 / kg</p>
    </div>

    <div class="item">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Tomato_je.jpg" alt="Tomato">
        <h3>Tomato</h3>
        <p class="price">₹40 / kg</p>
    </div>

    <div class="item">
        <img src="https://madhursugar.com/assets/images/banner-pack-blue.png">
        <h3>Sugar</h3>
        <p class="price">₹55 / kg</p>
    </div>

    <div class="item">
        <img src="https://theseedcompany.ca/cdn/shop/files/crop_CARR1923_Carrot___Sweetness_Pelleted_Long.png?v=1720113309">
        <h3>Carrot</h3>
        <p class="price">₹45 / kg</p>
    </div>

  
  
<footer>
    © 2026 Fresh Grocery Store | All Rights Reserved
</footer>

</body>
</html>
