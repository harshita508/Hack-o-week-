<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Weather Dashboard</title>
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --card-bg: rgba(255, 255, 255, 0.25);
            --text-primary: #1a1a2e;
            --text-secondary: #0f3460;
            --accent: #e94560;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #f0f8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .city-selector {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 8px 20px;
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .city-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .city-btn:hover, .city-btn.active {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .weather-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .weather-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), #ffd700, var(--accent));
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .location {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .temperature {
            font-size: 4.5em;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .condition {
            font-size: 1.4em;
            margin-bottom: 25px;
            font-weight: 500;
            opacity: 0.95;
        }

        .weather-icon {
            font-size: 6em;
            margin-bottom: 25px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            font-size: 0.85em;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: 700;
        }

        .updated {
            font-size: 0.8em;
            opacity: 0.7;
            font-style: italic;
        }

        @media (max-width: 480px) {
            .city-selector { flex-wrap: wrap; gap: 8px; padding: 12px; }
            .city-btn { padding: 10px 18px; font-size: 0.9em; }
            .weather-card { padding: 30px 25px; }
            .temperature { font-size: 3.5em; }
            .stats-grid { grid-template-columns: 1fr; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌍 Weather Dashboard</h1>
        <p>Current conditions across major cities</p>
    </div>

    <div class="city-selector">
        <button class="city-btn active" data-city="nagpur">Nagpur</button>
        <button class="city-btn" data-city="mumbai">Mumbai</button>
        <button class="city-btn" data-city="delhi">Delhi</button>
        <button class="city-btn" data-city="bangalore">Bangalore</button>
        <button class="city-btn" data-city="chennai">Chennai</button>
    </div>

    <div class="weather-card">
        <div class="location" id="location">Nagpur, Maharashtra</div>
        <div class="temperature" id="temp">32°</div>
        <div class="condition" id="condition">Sunny</div>
        <div class="weather-icon" id="icon">☀️</div>
        
        <div class="stats-grid">
            <div class="stat">
                <div class="stat-label">Humidity</div>
                <div class="stat-value" id="humidity">45%</div>
            </div>
            <div class="stat">
                <div class="stat-label">Wind</div>
                <div class="stat-value" id="wind">10 km/h</div>
            </div>
            <div class="stat">
                <div class="stat-label">Pressure</div>
                <div class="stat-value" id="pressure">1013 hPa</div>
            </div>
            <div class="stat">
                <div class="stat-label">UV Index</div>
                <div class="stat-value" id="uv">7</div>
            </div>
        </div>
        
        <div class="updated" id="updated">Last updated: Just now</div>
    </div>

    <script>
        // Static realistic weather data for Indian cities (March 2026)
        const weatherData = {
            nagpur: {
                location: "Nagpur, Maharashtra",
                temp: "32°",
                condition: "Sunny",
                icon: "☀️",
                humidity: "45%",
                wind: "10 km/h",
                pressure: "1013 hPa",
                uv: "7"
            },
            mumbai: {
                location: "Mumbai, Maharashtra", 
                temp: "30°",
                condition: "Partly Cloudy",
                icon: "⛅",
                humidity: "68%",
                wind: "15 km/h",
                pressure: "1009 hPa",
                uv: "6"
            },
            delhi: {
                location: "Delhi, Delhi",
                temp: "28°",
                condition: "Hazy",
                icon: "🌫️",
                humidity: "55%",
                wind: "8 km/h",
                pressure: "1015 hPa",
                uv: "5"
            },
            bangalore: {
                location: "Bangalore, Karnataka",
                temp: "27°",
                condition: "Clear",
                icon: "🌤️",
                humidity: "40%",
                wind: "12 km/h",
                pressure: "1011 hPa",
                uv: "8"
            },
            chennai: {
                location: "Chennai, Tamil Nadu",
                temp: "33°",
                condition: "Hot & Humid",
                icon: "🌞",
                humidity: "72%",
                wind: "18 km/h",
                pressure: "1007 hPa",
                uv: "9"
            }
        };

        // City buttons functionality
        document.querySelectorAll('.city-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all buttons
                document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
                // Add active class to clicked button
                btn.classList.add('active');
                
                const city = btn.dataset.city;
                updateWeather(city);
            });
        });

        function updateWeather(cityKey) {
            const data = weatherData[cityKey];
            const elements = {
                location: document.getElementById('location'),
                temp: document.getElementById('temp'),
                condition: document.getElementById('condition'),
                icon: document.getElementById('icon'),
                humidity: document.getElementById('humidity'),
                wind: document.getElementById('wind'),
                pressure: document.getElementById('pressure'),
                uv: document.getElementById('uv'),
                updated: document.getElementById('updated')
            };

            // Animate transition
            Object.values(elements).forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
            });

            setTimeout(() => {
                // Update all values
                Object.keys(data).forEach(key => {
                    if (elements[key]) elements[key].textContent = data[key];
                });
                
                // Reset animation
                Object.values(elements).forEach(el => {
                    el.style.transition = 'all 0.5s ease';
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                });

                elements.updated.textContent = 'Last updated: Just now';
            }, 200);

            // Simulate real-time update
            setTimeout(() => {
                const tempEl = document.getElementById('temp');
                if (tempEl.textContent.includes('32')) tempEl.textContent = '32.3°';
                else if (tempEl.textContent.includes('30')) tempEl.textContent = '30.1°';
                elements.updated.textContent = 'Live • 2s ago';
            }, 3000);
        }

        // Initialize with Nagpur
        document.addEventListener('DOMContentLoaded', () => {
            updateWeather('nagpur');
        });
    </script>
</body>
</html>
